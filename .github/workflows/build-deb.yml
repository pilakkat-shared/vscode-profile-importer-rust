name: Build .deb

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dpkg-deb
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build release and package
        run: |
          cd vscode-profile-importer-rust
          ./scripts/build_deb.sh

      - name: Tag checks
        id: tag_checks
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Checking tag: $TAG_NAME"
          # Determine if annotated tag (object type 'tag') or lightweight (object type 'commit')
          OBJ_TYPE=$(git for-each-ref --format='%(objecttype)' refs/tags/$TAG_NAME || echo "")
          if [ "$OBJ_TYPE" = "tag" ]; then
            echo "annotated=true" >> $GITHUB_OUTPUT
          else
            echo "annotated=false" >> $GITHUB_OUTPUT
          fi
          # Validate semver-like tag: vMAJOR.MINOR.PATCH (allow optional prerelease)
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+].*)?$ ]]; then
            echo "semver=true" >> $GITHUB_OUTPUT
          else
            echo "semver=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload .deb (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: vscode-profile-importer-deb
          path: vscode-profile-importer-rust/target/debian/vscode-profile-importer_0.1.0-1_amd64.deb

      - name: Prepare release notes
        id: prepare_release_notes
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.annotated == 'true' && steps.tag_checks.outputs.semver == 'true'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BODY=""
          # Prefer CHANGELOG.md or CHANGELOG if present
          if [ -f CHANGELOG.md ]; then
            F=CHANGELOG.md
          elif [ -f CHANGELOG ]; then
            F=CHANGELOG
          elif [ -f CHANGES.md ]; then
            F=CHANGES.md
          else
            F=""
          fi

          if [ -n "$F" ]; then
            VER="${TAG#v}"
            BODY=$(awk -v tag="$TAG" -v ver="$VER" '\n              BEGIN{found=0}\n              /^#{1,3} /{ if(found) exit }\n              { if(!found && (index($0, tag) || index($0, ver)) && /^#{1,3} /){ found=1; next } }\n              found{ print }\n            ' "$F" || true)
          fi

          if [ -z "$BODY" ]; then
            # Fall back to annotated tag message
            BODY=$(git for-each-ref --format='%(contents)' refs/tags/${TAG} || true)
          fi

          if [ -z "$BODY" ]; then
            BODY="Release $TAG"
          fi

          # Write output to GITHUB_OUTPUT safely (preserve newlines)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.annotated == 'true' && steps.tag_checks.outputs.semver == 'true'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: ${{ steps.prepare_release_notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release assets (checksum + source tarball)
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.semver == 'true'
        run: |
          cd vscode-profile-importer-rust/target/debian
          DEB=./vscode-profile-importer_0.1.0-1_amd64.deb
          sha256sum "$DEB" > "$DEB.sha256"
          cd ../../
          # create source tarball from the checked out repository at the current commit
          git archive --format=tar.gz -o "source-${GITHUB_REF_NAME}.tar.gz" "$GITHUB_SHA"
          ls -l "$DEB" "$DEB.sha256" "source-${GITHUB_REF_NAME}.tar.gz"

      - name: Upload .deb to Release
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.annotated == 'true' && steps.tag_checks.outputs.semver == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vscode-profile-importer-rust/target/debian/vscode-profile-importer_0.1.0-1_amd64.deb
          asset_name: vscode-profile-importer_0.1.0-1_amd64.deb
          asset_content_type: application/x-debian-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum to Release
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.annotated == 'true' && steps.tag_checks.outputs.semver == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vscode-profile-importer-rust/target/debian/vscode-profile-importer_0.1.0-1_amd64.deb.sha256
          asset_name: vscode-profile-importer_0.1.0-1_amd64.deb.sha256
          asset_content_type: text/plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload source tarball to Release
        if: startsWith(github.ref, 'refs/tags/') && steps.tag_checks.outputs.annotated == 'true' && steps.tag_checks.outputs.semver == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vscode-profile-importer-rust/source-${{ github.ref_name }}.tar.gz
          asset_name: vscode-profile-importer-source-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
